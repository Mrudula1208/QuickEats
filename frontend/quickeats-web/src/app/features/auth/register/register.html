

<h1>Create Account</h1>

<p>Please fill your details</p>



<label>Name</label>

<input

type="text"

placeholder="Enter Name"

[(ngModel)]="user.name"

>



<label>Email</label>

<input

type="email"

placeholder="Enter Email"

[(ngModel)]="user.email"

>




<label>Password</label>

<input

type="password"

placeholder="Enter Password"

[(ngModel)]="user.password"

>



<button

(click)="register()"

>

Register

</button>
